<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#6A1B9A">
  <meta name="description" content="Quiz edukacyjny dla klas 1-3 szkoły podstawowej">
  <title>Sprawdzian Trzecioklasisty</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #e8eaf6 0%, #f3e5f5 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .container {
      max-width: 500px;
      width: 100%;
      text-align: center;
    }
    .logo { font-size: 72px; margin-bottom: 8px; }
    h1 {
      font-size: 32px; font-weight: 800;
      color: #6A1B9A; margin-bottom: 4px;
    }
    .subtitle {
      font-size: 15px; color: #888;
      margin-bottom: 32px;
    }
    .cards { display: flex; flex-direction: column; gap: 16px; }
    .card {
      display: block; padding: 32px 24px; cursor: pointer;
      border-radius: 24px; text-decoration: none;
      transition: all 0.25s; box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    .card:active { transform: scale(0.97); }
    .card-math { background: linear-gradient(135deg, #4A90D9, #357ABD); color: white; }
    .card-polish { background: linear-gradient(135deg, #E91E63, #C2185B); color: white; }
    .card-nature { background: linear-gradient(135deg, #43A047, #388E3C); color: white; }
    .card-icon { font-size: 48px; display: block; margin-bottom: 12px; }
    .card-title { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
    .card-desc { font-size: 14px; opacity: 0.9; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">📚</div>
    <h1>Sprawdzian Trzecioklasisty</h1>
    <p class="subtitle">Wybierz przedmiot i sprawdź swoją wiedzę</p>
    <div class="cards">
      <a class="card card-math" href="matematyka/">
        <span class="card-icon">🧮</span>
        <div class="card-title">Matematyka</div>
        <div class="card-desc">Dodawanie, odejmowanie, mnożenie, geometria i więcej</div>
      </a>
      <a class="card card-polish" href="jezyk-polski/">
        <span class="card-icon">📖</span>
        <div class="card-title">Język polski</div>
        <div class="card-desc">Ortografia, gramatyka, czytanie, lektury i więcej</div>
      </a>
      <a class="card card-nature" href="przyroda/">
        <span class="card-icon">🌿</span>
        <div class="card-title">Przyroda i społeczeństwo</div>
        <div class="card-desc">Rośliny, zwierzęta, pogoda, ekologia, zdrowie i więcej</div>
      </a>
    </div>
  </div>
</body>
</html>
