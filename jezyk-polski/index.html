<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#E91E63">
  <meta name="description" content="Quiz z języka polskiego dla klas 1-3 szkoły podstawowej">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>Polski Mistrz - Quiz dla Trzecioklasisty</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <div id="screen-categories" class="screen active">
      <div class="container">
        <h2>Wybierz kategorię</h2>
        <div id="categories-list" class="categories-grid"></div>
        <button class="btn btn-secondary btn-small" onclick="showScreen('screen-lektury')" style="margin-top:16px">📖 Opracowania lektur</button>
        <a href="../" class="link-back" style="margin-top:8px">← Strona główna</a>
      </div>
    </div>

    <div id="screen-quiz" class="screen">
      <div class="container">
        <div id="quiz-header">
          <button class="btn-quit" onclick="quitQuiz()" aria-label="Opuść quiz">✕</button>
          <div id="quiz-progress">Pytanie <span id="current-question">1</span> z <span id="total-questions">10</span></div>
          <div id="quiz-timer">⏱ <span id="timer-display">00:00</span></div>
          <div id="quiz-score">⭐ <span id="score-display">0</span></div>
        </div>
        <div id="quiz-category-label" class="category-label"></div>
        <div id="question-text" class="question-text"></div>
        <button class="btn-notepad" onclick="toggleNotepad()" id="btn-notepad">📝 Notatnik</button>
        <div id="notepad-container" class="notepad-container hidden">
          <textarea id="notepad-text" class="notepad-textarea" placeholder="Tu możesz zanotować swoje przemyślenia..." rows="4"></textarea>
        </div>
        <div id="answers-container" class="answers"></div>
        <div id="explanation-box" class="explanation hidden">
          <div id="explanation-content"></div>
          <button class="btn btn-primary" onclick="nextQuestion()">Następne pytanie →</button>
        </div>
      </div>
    </div>

    <div id="screen-results" class="screen">
      <div class="container">
        <div class="results-header">
          <div class="results-icon">🏆</div>
          <h2>Koniec quizu!</h2>
        </div>
        <div id="results-summary" class="results-summary"></div>
        <div id="results-details" class="results-details"></div>
        <button class="btn btn-primary btn-large" onclick="showScreen('screen-categories')">Następny quiz</button>
        <a href="../" class="btn btn-secondary" style="margin-top:12px;text-decoration:none;display:inline-block">← Strona główna</a>
      </div>
    </div>

    <!-- Ekran opracowań lektur -->
    <div id="screen-lektury" class="screen">
      <div class="container">
        <div class="lektury-header">
          <button class="btn-quit" onclick="showScreen('screen-categories')" aria-label="Powrót">✕</button>
          <h2 style="flex:1;margin:0">📖 Opracowania lektur</h2>
        </div>
        <div id="lektury-list" class="lektury-list scrollable"></div>
      </div>
    </div>

    <!-- Ekran szczegółów lektury -->
    <div id="screen-lektura-detail" class="screen">
      <div class="container">
        <div class="lektury-header">
          <button class="btn-quit" onclick="showScreen('screen-lektury')" aria-label="Powrót">✕</button>
          <h2 style="flex:1;margin:0" id="lektura-detail-title">Tytuł</h2>
        </div>
        <div id="lektura-detail-content" class="lektura-detail scrollable"></div>
      </div>
    </div>
  </div>

  <script src="js/questions.js"></script>
  <script src="js/quiz.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
